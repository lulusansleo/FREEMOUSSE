name: Code quality

on:
  pull_request:
    branches: ["dev", "main"]

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          find src include -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format --dry-run --Werror
        # Fails the PR if any file is not formatted.
        # Fix locally with: clang-format -i <file>  or  scripts/format.sh

  tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libportaudio-dev libfftw3-dev libaubio-dev libsdl2-dev libgl-dev \
            cmake ninja-build clang clang-tidy
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy
        run: |
          find src -name '*.cpp' | \
            xargs clang-tidy -p build \
              --warnings-as-errors='bugprone-*,clang-analyzer-*,performance-*'

  sanitizers:
    name: AddressSanitizer + UBSan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libportaudio-dev libfftw3-dev libaubio-dev libsdl2-dev libgl-dev \
            cmake ninja-build clang
      - name: Configure with sanitizers
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DDV_ENABLE_ASAN=ON \
            -DDV_ENABLE_UBSAN=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Run tests under sanitizers
        run: ctest --test-dir build --output-on-failure
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
